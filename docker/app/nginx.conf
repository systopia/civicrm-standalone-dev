map $request_method $not_an_allowed_http_method {
    default 1;
    OPTIONS 0;
    GET     0;
    HEAD    0;
    POST    0;
}

# When the request comes via a proxy that terminates HTTPS, propagate
# X-Forwarded-Proto into $_SERVER['HTTPS'] so PHP/Civi generate https-URLs.
map $http_x_forwarded_proto $https_if_forwarded {
    default "";
    https   "on";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Proxy network: trust X-Forwarded-* so the real client IP shows up
    # in access logs and Civi's request inspection.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;

    root /var/www/html;
    index index.php;

    client_max_body_size 64M;
    fastcgi_keep_conn on;

    if ($not_an_allowed_http_method) {
        return 405;
    }

    # Root → index.php
    location = / {
        include fastcgi.conf;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param QUERY_STRING    q=$uri&$args;
        fastcgi_param HTTPS           $https_if_forwarded if_not_empty;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location = /robots.txt {
        try_files $uri 404;
        log_not_found off;
        access_log off;
    }

    location = /favicon.ico {
        try_files $uri 404;
        log_not_found off;
        access_log off;
    }

    # All CiviCRM dynamic routes go through index.php
    location ^~ /civicrm/ {
        include fastcgi.conf;
        fastcgi_read_timeout 300s;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param QUERY_STRING    q=$uri&$args;
        fastcgi_param HTTPS           $https_if_forwarded if_not_empty;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Static assets shipped by core/extensions and public uploads
    location ~ ^/(public|core|ext)/.*\.(png|css|jpg|jpeg|js|mjs|json|webp|gif|ico|svg|woff|woff2|ttf|eot|otf|map|html|txt)$ {
        try_files $uri 404;
        access_log off;
    }

    # Deprecated /extern/ entrypoints — whitelist only
    location ~ ^/core/extern/(authorizeIPN|cxn|ipn|open|rest|soap|url|widget)\.php$ {
        include fastcgi.conf;
        fastcgi_param HTTPS $https_if_forwarded if_not_empty;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Block dotfiles except .well-known
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Explicitly deny private data dir
    location ^~ /private/ {
        deny all;
        return 404;
    }

    # Everything else: 404
    location / {
        return 404;
    }
}
